# thesis_sweeps2.conf
# Balanced full-factorial design: attack_mode(2) × selection_mode(3) × layering_mode(3) = 18 per bucket
# Plus 3 baselines per bucket: clean (no attack), fixed sign_flip, fixed mean_shift.
#
# Format per line:
# label|start_round|end_round|ramp_end|attack_mode|selection_mode|churn_fraction|layering_mode|layered_k|layered_attacks|layer_multipliers
#
# Design principles:
# - Every factor combination appears exactly once per bucket (no confounding).
# - 3 buckets (0, 5, 10). Bucket 15 dropped: only 15 attack rounds gives the
#   epsilon-greedy bandit ~3 windows of 5, insufficient to converge.
# - Ramp scales with start bucket: later onset → steeper ramp.
#     Bucket 00 (30 atk rounds): ramp_end = 2.0
#     Bucket 05 (25 atk rounds): ramp_end = 3.0
#     Bucket 10 (20 atk rounds): ramp_end = 4.0
# - Equal adaptive vs weighted_random (9 each per bucket = 27 vs 27 factorial).
# - Equal selection modes (6 each per bucket).
# - Equal layering modes (6 each per bucket).
# - Stacked attacks appear under BOTH adaptive and weighted_random.
# - Baselines per bucket: clean (no-attack), fixed sign_flip, fixed mean_shift.
#   Clean → accuracy ceiling.  Fixed → best-single-attack damage floor.
#   Baseline rows use weighted_random|churn|0.5 as placeholder values; these
#   fields have no effect because:
#     • BL_clean: window=31|31 so no attack round ever fires.
#     • BL_signflip/meanshift: layering_mode=fixed + layered_k=1 forces that
#       single attack every round, bypassing mode/selection entirely.
#
# Recommended invocation (3 repeats for error bars & significance tests):
#   ./run_thesis_sweep.sh --name thesis_balanced --sweeps-file docs/thesis_sweeps2.conf \
#       --strategies "bulyan,multikrum,fedtrimmedavg,fedmedian,fltrust" \
#       --repeats 3 --seeds "1337,2027,4242"
#   → 63 scenarios × 3 repeats × 5 strategies = 945 runs
#
# Total: (18 factorial + 3 baselines) × 3 buckets = 63 scenarios.

